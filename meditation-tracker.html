<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>靜心日誌</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@300;400;600&family=DM+Serif+Display:ital@0;1&family=Noto+Sans+TC:wght@300;400&display=swap" rel="stylesheet">
<style>
  :root {
    --ink: #1a1410;
    --paper: #f5f0e8;
    --stone: #8b7d6b;
    --mist: #c4b8a8;
    --sage: #7a9e87;
    --gold: #c9a84c;
    --warm: #e8ddd0;
    --deep: #2d2420;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--paper);
    color: var(--ink);
    font-family: 'Noto Sans TC', sans-serif;
    font-weight: 300;
    min-height: 100vh;
    position: relative;
    overflow-x: hidden;
  }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background: 
      radial-gradient(ellipse 80% 60% at 20% 80%, rgba(122,158,135,0.12) 0%, transparent 60%),
      radial-gradient(ellipse 60% 80% at 80% 20%, rgba(201,168,76,0.08) 0%, transparent 60%);
    pointer-events: none;
    z-index: 0;
  }

  .grain {
    position: fixed;
    inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.75' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
    background-size: 200px;
    pointer-events: none;
    z-index: 1;
    opacity: 0.6;
  }

  .app {
    position: relative;
    z-index: 2;
    max-width: 480px;
    margin: 0 auto;
    padding: 0 20px 100px;
  }

  /* Header */
  .header {
    text-align: center;
    padding: 48px 0 32px;
    border-bottom: 1px solid var(--mist);
    margin-bottom: 40px;
  }

  .header-en {
    font-family: 'DM Serif Display', serif;
    font-style: italic;
    font-size: 11px;
    letter-spacing: 0.3em;
    color: var(--stone);
    text-transform: uppercase;
    margin-bottom: 8px;
  }

  .header-title {
    font-family: 'Noto Serif TC', serif;
    font-size: 28px;
    font-weight: 300;
    letter-spacing: 0.15em;
    color: var(--deep);
  }

  .header-date {
    margin-top: 12px;
    font-size: 12px;
    color: var(--stone);
    letter-spacing: 0.1em;
  }

  /* Streak Banner */
  .streak-banner {
    background: var(--deep);
    color: var(--paper);
    border-radius: 16px;
    padding: 20px 24px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 32px;
    animation: fadeUp 0.6s ease both;
  }

  .streak-left { display: flex; align-items: center; gap: 14px; }

  .streak-icon {
    width: 44px; height: 44px;
    background: var(--gold);
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 20px;
  }

  .streak-label { font-size: 11px; color: var(--mist); letter-spacing: 0.1em; margin-bottom: 2px; }
  .streak-num { font-family: 'DM Serif Display', serif; font-size: 26px; color: var(--gold); }

  .streak-right { text-align: right; }
  .streak-sub { font-size: 11px; color: var(--mist); }
  .streak-total { font-size: 18px; font-family: 'Noto Serif TC', serif; font-weight: 400; }

  /* Section Label */
  .section-label {
    font-size: 10px;
    letter-spacing: 0.3em;
    color: var(--stone);
    text-transform: uppercase;
    margin-bottom: 16px;
  }

  /* Timer Card */
  .timer-card {
    background: white;
    border-radius: 20px;
    padding: 32px 24px;
    margin-bottom: 24px;
    box-shadow: 0 2px 20px rgba(26,20,16,0.06);
    animation: fadeUp 0.6s ease 0.1s both;
  }

  /* Duration Selector */
  .duration-row {
    display: flex;
    gap: 8px;
    margin-bottom: 28px;
    justify-content: center;
  }

  .dur-btn {
    flex: 1;
    max-width: 70px;
    padding: 8px 0;
    border: 1.5px solid var(--mist);
    border-radius: 100px;
    background: transparent;
    font-family: 'Noto Serif TC', serif;
    font-size: 13px;
    color: var(--stone);
    cursor: pointer;
    transition: all 0.2s;
  }

  .dur-btn.active {
    border-color: var(--sage);
    background: var(--sage);
    color: white;
  }

  /* Timer Display */
  .timer-ring-wrap {
    display: flex;
    flex-direction: column;
    align-items: center;
    margin-bottom: 28px;
  }

  .ring-svg { transform: rotate(-90deg); }

  .ring-bg { fill: none; stroke: var(--warm); stroke-width: 6; }
  .ring-prog { 
    fill: none; stroke: var(--sage); stroke-width: 6;
    stroke-linecap: round;
    transition: stroke-dashoffset 1s linear;
  }

  .timer-inner {
    position: absolute;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
  }

  .ring-container {
    position: relative;
    width: 170px;
    height: 170px;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .timer-display {
    font-family: 'DM Serif Display', serif;
    font-size: 42px;
    color: var(--deep);
    letter-spacing: 0.02em;
  }

  .timer-phase {
    font-size: 11px;
    color: var(--stone);
    letter-spacing: 0.15em;
    margin-top: 2px;
  }

  /* Breath Guide */
  .breath-guide {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    margin-bottom: 8px;
    height: 28px;
  }

  .breath-dot {
    width: 10px; height: 10px;
    border-radius: 50%;
    background: var(--sage);
    opacity: 0.2;
    transition: all 0.5s ease;
  }

  .breath-dot.active {
    opacity: 1;
    transform: scale(1.4);
  }

  .breath-text {
    font-size: 11px;
    color: var(--stone);
    letter-spacing: 0.2em;
    text-align: center;
    height: 16px;
    margin-bottom: 20px;
  }

  /* Controls */
  .controls {
    display: flex;
    gap: 12px;
    justify-content: center;
  }

  .btn-main {
    padding: 14px 40px;
    background: var(--deep);
    color: var(--paper);
    border: none;
    border-radius: 100px;
    font-family: 'Noto Serif TC', serif;
    font-size: 15px;
    letter-spacing: 0.1em;
    cursor: pointer;
    transition: all 0.2s;
  }

  .btn-main:active { transform: scale(0.97); }
  .btn-main.running { background: var(--sage); }

  .btn-reset {
    padding: 14px 20px;
    background: var(--warm);
    color: var(--stone);
    border: none;
    border-radius: 100px;
    font-family: 'Noto Sans TC', sans-serif;
    font-size: 13px;
    cursor: pointer;
    transition: all 0.2s;
  }

  /* Session Note */
  .note-card {
    background: white;
    border-radius: 20px;
    padding: 24px;
    margin-bottom: 24px;
    box-shadow: 0 2px 20px rgba(26,20,16,0.06);
    animation: fadeUp 0.6s ease 0.2s both;
  }

  .note-title {
    font-family: 'Noto Serif TC', serif;
    font-size: 14px;
    color: var(--deep);
    margin-bottom: 12px;
  }

  .mood-row {
    display: flex;
    gap: 10px;
    margin-bottom: 14px;
    flex-wrap: wrap;
  }

  .mood-chip {
    padding: 6px 14px;
    border: 1.5px solid var(--mist);
    border-radius: 100px;
    font-size: 12px;
    color: var(--stone);
    cursor: pointer;
    transition: all 0.2s;
    background: transparent;
    font-family: 'Noto Sans TC', sans-serif;
  }

  .mood-chip.selected {
    border-color: var(--gold);
    background: rgba(201,168,76,0.1);
    color: var(--deep);
  }

  .note-textarea {
    width: 100%;
    border: 1.5px solid var(--warm);
    border-radius: 12px;
    padding: 12px 14px;
    font-family: 'Noto Sans TC', sans-serif;
    font-size: 13px;
    color: var(--ink);
    resize: none;
    background: var(--paper);
    outline: none;
    line-height: 1.7;
    transition: border-color 0.2s;
  }

  .note-textarea:focus { border-color: var(--sage); }

  .save-btn {
    width: 100%;
    margin-top: 12px;
    padding: 12px;
    background: var(--sage);
    color: white;
    border: none;
    border-radius: 12px;
    font-family: 'Noto Serif TC', serif;
    font-size: 14px;
    letter-spacing: 0.1em;
    cursor: pointer;
    transition: all 0.2s;
  }

  .save-btn:disabled { opacity: 0.4; cursor: default; }

  /* History */
  .history-card {
    background: white;
    border-radius: 20px;
    padding: 24px;
    box-shadow: 0 2px 20px rgba(26,20,16,0.06);
    animation: fadeUp 0.6s ease 0.3s both;
  }

  .history-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 20px;
  }

  .history-title {
    font-family: 'Noto Serif TC', serif;
    font-size: 14px;
    color: var(--deep);
  }

  .history-count {
    font-size: 11px;
    color: var(--stone);
    background: var(--warm);
    padding: 4px 10px;
    border-radius: 100px;
  }

  /* Calendar strip */
  .cal-strip {
    display: flex;
    gap: 6px;
    margin-bottom: 20px;
    overflow-x: auto;
    padding-bottom: 4px;
  }

  .cal-day {
    flex-shrink: 0;
    width: 38px;
    height: 52px;
    border-radius: 10px;
    background: var(--warm);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 4px;
  }

  .cal-day.has-session { background: var(--sage); }
  .cal-day.today { border: 2px solid var(--gold); }

  .cal-day-name { font-size: 9px; color: var(--stone); letter-spacing: 0.05em; }
  .cal-day.has-session .cal-day-name { color: rgba(255,255,255,0.8); }
  .cal-day-num { font-family: 'DM Serif Display', serif; font-size: 16px; color: var(--deep); }
  .cal-day.has-session .cal-day-num { color: white; }
  .cal-day-dot { width: 5px; height: 5px; border-radius: 50%; background: var(--gold); }

  /* Session list */
  .session-item {
    display: flex;
    align-items: center;
    gap: 14px;
    padding: 14px 0;
    border-bottom: 1px solid var(--warm);
  }

  .session-item:last-child { border-bottom: none; }

  .session-icon {
    width: 40px; height: 40px;
    border-radius: 12px;
    background: var(--warm);
    display: flex; align-items: center; justify-content: center;
    font-size: 18px;
    flex-shrink: 0;
  }

  .session-info { flex: 1; }
  .session-top { display: flex; justify-content: space-between; align-items: center; margin-bottom: 4px; }
  .session-dur { font-family: 'Noto Serif TC', serif; font-size: 15px; color: var(--deep); }
  .session-time { font-size: 11px; color: var(--stone); }
  .session-mood { display: inline-block; font-size: 11px; color: var(--stone); background: var(--warm); padding: 2px 8px; border-radius: 100px; margin-right: 4px; }
  .session-note-text { font-size: 12px; color: var(--stone); margin-top: 4px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 260px; }

  .empty-state {
    text-align: center;
    padding: 32px 0;
    color: var(--mist);
    font-size: 13px;
    line-height: 2;
  }

  .empty-state-icon { font-size: 36px; margin-bottom: 8px; }

  /* Toast */
  .toast {
    position: fixed;
    bottom: 30px;
    left: 50%;
    transform: translateX(-50%) translateY(20px);
    background: var(--deep);
    color: var(--paper);
    padding: 12px 24px;
    border-radius: 100px;
    font-size: 13px;
    letter-spacing: 0.05em;
    opacity: 0;
    transition: all 0.3s;
    z-index: 100;
    white-space: nowrap;
  }

  .toast.show {
    opacity: 1;
    transform: translateX(-50%) translateY(0);
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(16px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  /* Completion animation */
  @keyframes pulse-ring {
    0% { box-shadow: 0 0 0 0 rgba(122,158,135,0.4); }
    70% { box-shadow: 0 0 0 20px rgba(122,158,135,0); }
    100% { box-shadow: 0 0 0 0 rgba(122,158,135,0); }
  }

  .btn-main.done { animation: pulse-ring 1s ease 3; }
</style>
</head>
<body>
<div class="grain"></div>

<div class="app">
  <!-- Header -->
  <div class="header">
    <div class="header-en">Meditation Journal</div>
    <div class="header-title">靜心日誌</div>
    <div class="header-date" id="headerDate"></div>
  </div>

  <!-- Streak -->
  <div class="streak-banner">
    <div class="streak-left">
      <div class="streak-icon">🔥</div>
      <div>
        <div class="streak-label">連續天數</div>
        <div class="streak-num" id="streakNum">0</div>
      </div>
    </div>
    <div class="streak-right">
      <div class="streak-sub">累計次數</div>
      <div class="streak-total" id="totalSessions">0 次</div>
    </div>
  </div>

  <!-- Timer -->
  <div class="section-label">計時冥想</div>
  <div class="timer-card">
    <div class="duration-row">
      <button class="dur-btn active" data-min="5">5 分</button>
      <button class="dur-btn" data-min="10">10 分</button>
      <button class="dur-btn" data-min="15">15 分</button>
      <button class="dur-btn" data-min="20">20 分</button>
    </div>

    <div class="timer-ring-wrap">
      <div class="ring-container">
        <svg class="ring-svg" width="170" height="170" viewBox="0 0 170 170">
          <circle class="ring-bg" cx="85" cy="85" r="76"/>
          <circle class="ring-prog" id="ringProg" cx="85" cy="85" r="76"
            stroke-dasharray="477.5"
            stroke-dashoffset="0"/>
        </svg>
        <div class="timer-inner">
          <div class="timer-display" id="timerDisplay">05:00</div>
          <div class="timer-phase" id="timerPhase">準備開始</div>
        </div>
      </div>
    </div>

    <div class="breath-guide" id="breathGuide">
      <div class="breath-dot" id="bd1"></div>
      <div class="breath-dot" id="bd2"></div>
      <div class="breath-dot" id="bd3"></div>
      <div class="breath-dot" id="bd4"></div>
    </div>
    <div class="breath-text" id="breathText"></div>

    <div class="controls">
      <button class="btn-main" id="startBtn" onclick="toggleTimer()">開始</button>
      <button class="btn-reset" id="resetBtn" onclick="resetTimer()">重置</button>
    </div>
  </div>

  <!-- Note Card -->
  <div class="section-label">記錄感受</div>
  <div class="note-card">
    <div class="note-title">這次冥想的狀態</div>
    <div class="mood-row" id="moodRow">
      <button class="mood-chip" data-mood="平靜">🌿 平靜</button>
      <button class="mood-chip" data-mood="專注">🎯 專注</button>
      <button class="mood-chip" data-mood="放鬆">☁️ 放鬆</button>
      <button class="mood-chip" data-mood="疲倦">🌙 疲倦</button>
      <button class="mood-chip" data-mood="雜念多">🌀 雜念多</button>
      <button class="mood-chip" data-mood="喜悅">✨ 喜悅</button>
    </div>
    <textarea class="note-textarea" id="noteText" rows="3" placeholder="留下這次冥想的片刻感受…"></textarea>
    <button class="save-btn" id="saveBtn" onclick="saveSession()">儲存紀錄</button>
  </div>

  <!-- History -->
  <div class="section-label">冥想記錄</div>
  <div class="history-card">
    <div class="history-header">
      <div class="history-title">近 7 天</div>
      <div class="history-count" id="weekCount">0 次</div>
    </div>
    <div class="cal-strip" id="calStrip"></div>
    <div id="sessionList"></div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
// ── State ──
let sessions = JSON.parse(localStorage.getItem('medi_sessions') || '[]');
let timerInterval = null;
let selectedMin = 5;
let remaining = 300;
let isRunning = false;
let selectedMoods = [];
let breathStep = 0;
let breathInterval = null;
let justCompleted = false;

// ── Init ──
function init() {
  const now = new Date();
  const days = ['日','一','二','三','四','五','六'];
  document.getElementById('headerDate').textContent = 
    `${now.getFullYear()}年${now.getMonth()+1}月${now.getDate()}日　星期${days[now.getDay()]}`;
  
  renderStreak();
  renderCalendar();
  renderSessions();
  updateRing(1);
}

// ── Timer ──
document.querySelectorAll('.dur-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    if (isRunning) return;
    document.querySelectorAll('.dur-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    selectedMin = parseInt(btn.dataset.min);
    remaining = selectedMin * 60;
    updateDisplay();
    updateRing(1);
    document.getElementById('timerPhase').textContent = '準備開始';
  });
});

document.getElementById('moodRow').addEventListener('click', e => {
  const chip = e.target.closest('.mood-chip');
  if (!chip) return;
  const mood = chip.dataset.mood;
  if (selectedMoods.includes(mood)) {
    selectedMoods = selectedMoods.filter(m => m !== mood);
    chip.classList.remove('selected');
  } else {
    selectedMoods.push(mood);
    chip.classList.add('selected');
  }
});

function formatTime(s) {
  const m = Math.floor(s / 60).toString().padStart(2,'0');
  const sec = (s % 60).toString().padStart(2,'0');
  return `${m}:${sec}`;
}

function updateDisplay() {
  document.getElementById('timerDisplay').textContent = formatTime(remaining);
}

function updateRing(ratio) {
  const circ = 477.5;
  document.getElementById('ringProg').style.strokeDashoffset = circ * (1 - ratio);
}

function startBreath() {
  const phases = [
    { text: '吸氣…', dots: [0], dur: 4000 },
    { text: '持氣…', dots: [0,1], dur: 2000 },
    { text: '呼氣…', dots: [0,1,2,3], dur: 6000 },
    { text: '…', dots: [], dur: 1000 }
  ];
  let pi = 0;
  const dots = [document.getElementById('bd1'), document.getElementById('bd2'),
                 document.getElementById('bd3'), document.getElementById('bd4')];

  function step() {
    const ph = phases[pi % phases.length];
    document.getElementById('breathText').textContent = ph.text;
    document.getElementById('timerPhase').textContent = ph.text;
    dots.forEach((d, i) => d.classList.toggle('active', ph.dots.includes(i)));
    pi++;
    breathInterval = setTimeout(step, ph.dur);
  }
  step();
}

function stopBreath() {
  clearTimeout(breathInterval);
  document.getElementById('breathText').textContent = '';
  document.getElementById('timerPhase').textContent = isRunning ? '冥想中' : '準備開始';
  [1,2,3,4].forEach(i => document.getElementById('bd'+i).classList.remove('active'));
}

function toggleTimer() {
  if (isRunning) {
    // Pause
    clearInterval(timerInterval);
    stopBreath();
    isRunning = false;
    document.getElementById('startBtn').textContent = '繼續';
    document.getElementById('startBtn').classList.remove('running');
    document.getElementById('timerPhase').textContent = '已暫停';
  } else {
    // Start/Resume
    isRunning = true;
    document.getElementById('startBtn').textContent = '暫停';
    document.getElementById('startBtn').classList.add('running');
    startBreath();
    const total = selectedMin * 60;
    timerInterval = setInterval(() => {
      remaining--;
      updateDisplay();
      updateRing(remaining / total);
      if (remaining <= 0) {
        clearInterval(timerInterval);
        stopBreath();
        isRunning = false;
        justCompleted = true;
        document.getElementById('timerPhase').textContent = '完成 🎉';
        document.getElementById('startBtn').textContent = '開始';
        document.getElementById('startBtn').classList.remove('running');
        document.getElementById('startBtn').classList.add('done');
        showToast('冥想完成！請記錄感受 🌿');
        setTimeout(() => document.getElementById('startBtn').classList.remove('done'), 4000);
      }
    }, 1000);
  }
}

function resetTimer() {
  clearInterval(timerInterval);
  clearTimeout(breathInterval);
  isRunning = false;
  justCompleted = false;
  remaining = selectedMin * 60;
  updateDisplay();
  updateRing(1);
  stopBreath();
  document.getElementById('startBtn').textContent = '開始';
  document.getElementById('startBtn').classList.remove('running', 'done');
  document.getElementById('timerPhase').textContent = '準備開始';
}

// ── Save Session ──
function saveSession() {
  const note = document.getElementById('noteText').value.trim();
  const dur = selectedMin;
  const now = new Date();

  const session = {
    id: Date.now(),
    date: now.toISOString(),
    duration: dur,
    moods: [...selectedMoods],
    note: note,
    completed: justCompleted
  };

  sessions.unshift(session);
  localStorage.setItem('medi_sessions', JSON.stringify(sessions));
  
  // Reset form
  document.getElementById('noteText').value = '';
  selectedMoods = [];
  document.querySelectorAll('.mood-chip').forEach(c => c.classList.remove('selected'));
  justCompleted = false;
  
  showToast('紀錄已儲存 ✨');
  renderStreak();
  renderCalendar();
  renderSessions();
}

// ── Streak ──
function renderStreak() {
  const today = dateStr(new Date());
  let streak = 0;
  let d = new Date();
  while (true) {
    const ds = dateStr(d);
    const hasSes = sessions.some(s => dateStr(new Date(s.date)) === ds);
    if (hasSes) { streak++; d.setDate(d.getDate() - 1); }
    else break;
  }
  document.getElementById('streakNum').textContent = streak;
  document.getElementById('totalSessions').textContent = sessions.length + ' 次';
}

// ── Calendar ──
function renderCalendar() {
  const strip = document.getElementById('calStrip');
  strip.innerHTML = '';
  const days = ['日','一','二','三','四','五','六'];
  const today = new Date();
  for (let i = 6; i >= 0; i--) {
    const d = new Date(today);
    d.setDate(today.getDate() - i);
    const ds = dateStr(d);
    const hasSes = sessions.some(s => dateStr(new Date(s.date)) === ds);
    const isToday = i === 0;
    
    const el = document.createElement('div');
    el.className = `cal-day${hasSes ? ' has-session' : ''}${isToday ? ' today' : ''}`;
    el.innerHTML = `
      <span class="cal-day-name">${days[d.getDay()]}</span>
      <span class="cal-day-num">${d.getDate()}</span>
      ${hasSes ? '<span class="cal-day-dot"></span>' : ''}
    `;
    strip.appendChild(el);
  }
  // Week count
  const weekAgo = new Date(); weekAgo.setDate(weekAgo.getDate() - 7);
  const wc = sessions.filter(s => new Date(s.date) >= weekAgo).length;
  document.getElementById('weekCount').textContent = wc + ' 次';
}

// ── Session List ──
function renderSessions() {
  const list = document.getElementById('sessionList');
  const recent = sessions.slice(0, 10);
  
  if (recent.length === 0) {
    list.innerHTML = `<div class="empty-state"><div class="empty-state-icon">🌱</div>還沒有冥想紀錄<br>開始你的第一次靜心吧</div>`;
    return;
  }

  list.innerHTML = recent.map(s => {
    const d = new Date(s.date);
    const timeStr = `${d.getMonth()+1}/${d.getDate()} ${d.getHours().toString().padStart(2,'0')}:${d.getMinutes().toString().padStart(2,'0')}`;
    const moodHtml = s.moods.map(m => `<span class="session-mood">${m}</span>`).join('');
    const noteHtml = s.note ? `<div class="session-note-text">${s.note}</div>` : '';
    const icon = s.completed ? '✅' : '⏸';
    
    return `<div class="session-item">
      <div class="session-icon">${icon}</div>
      <div class="session-info">
        <div class="session-top">
          <span class="session-dur">${s.duration} 分鐘</span>
          <span class="session-time">${timeStr}</span>
        </div>
        <div>${moodHtml}</div>
        ${noteHtml}
      </div>
    </div>`;
  }).join('');
}

// ── Utils ──
function dateStr(d) {
  return `${d.getFullYear()}-${d.getMonth()+1}-${d.getDate()}`;
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
}

// ── Start ──
remaining = selectedMin * 60;
updateDisplay();
init();
</script>
